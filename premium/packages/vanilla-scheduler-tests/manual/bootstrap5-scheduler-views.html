        center: 'title',
        right: 'resourceTimelineWeek,resourceTimeGridDay'

      resources: [
        {
          id: 'rooms',
          title: 'Rooms',
          children: [
            { id: 'room-a', title: 'Room A' },

        { resourceId: 'room-a', title: 'All-day 2', start: '2024-05-12' },

    calendar.render();
  });
