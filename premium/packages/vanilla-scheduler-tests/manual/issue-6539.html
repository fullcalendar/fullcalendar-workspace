<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='utf-8' />
<title>Flat Resource Timeline Example</title>

<link rel='stylesheet' href='../../../../standard/packages/vanilla/dist/skeleton.css' />
<link rel='stylesheet' href='../../../../standard/packages/vanilla/dist/themes/classic/theme.css' />
<link rel='stylesheet' href='../../../../standard/packages/vanilla/dist/themes/classic/palette.css' />

<script src='../../../../standard/packages/vanilla/dist/all.global.js'></script>
<script src='../../../../standard/packages/vanilla/dist/themes/classic/global.js'></script>
<script src='../../vanilla-scheduler/dist/all.global.js'></script>
<script>

  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'resourceTimelineMonth',
      slotMinWidth: 1,
      height: 300,
      slotLabelFormat: [
        { day: 'numeric' }
      ],
      resources: 'https://fullcalendar.io/demo-resources.json?with-nesting&with-colors',
      events: 'https://fullcalendar.io/demo-events.json?single-day&for-resource-timeline'
    });

    calendar.render();
  });

</script>
<style>

  body {
    margin: 0;
    padding: 0;
    font-family: Arial, Helvetica Neue, Helvetica, sans-serif;
    font-size: 14px;
  }

  #calendar {
    max-width: 1100px;
    margin: 50px auto;
  }

</style>
</head>
<body>

  <div id='calendar'></div>

</body>
</html>
